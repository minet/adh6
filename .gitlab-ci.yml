variables:
  UV_CACHE_DIR: .cache/uv
  UV_LINK_MODE: copy
  UV_SYSTEM_PYTHON: 1
  BACKEND_DIR: $CI_PROJECT_DIR/api_server
  FRONTEND_DIR: $CI_PROJECT_DIR/frontend_angular
  OPENAPI_CLI: /opt/openapi-generator/modules/openapi-generator-cli/target/openapi-generator-cli.jar

# We declare a job that gitlab ignores and put a YAML anchor
# See https://gitlab.com/gitlab-org/gitlab-ce/issues/15403#note_27079119
.setup_test_jobs: &before_python_jobs
  image: ghcr.io/astral-sh/uv:python3.11-alpine
  cache:
    key: uv
    paths:
      - .cache/uv
      - /var/cache/apk
  before_script:
    - cd api_server/
    - apk update
    - apk add git mariadb-dev build-base libffi-dev sqlite
    - uv sync --frozen

.setup_angular_jobs: &before_angular_jobs
  image: node:22-alpine
  cache:
    key: yarn
    paths:
      - .yarn-cache
      - /var/cache/apk
  before_script:
    - apk update
    - apk add python3 make g++ openssl
    - yarn config set cache-folder .yarn-cache
    - cd frontend_angular/
    - yarn --network-timeout 100000 install --frozen-lockfile

stages:
  - conformity
  - generation
  - lint
  - test
  - build
  - deploy

################################################
########## Execute when merge request ##########
################################################
semgrep:
  stage: conformity
  image: returntocorp/semgrep
  script: semgrep ci --exclude api_server/adh6/member/member_manager.py --exclude reverse_proxy/adh6.template.conf --exclude frontend_angular/yarn.lock --exclude api_server/manage.py
  rules:
    - if: $CI_MERGE_REQUEST_IID
  variables:
    SEMGREP_RULES: >-
      p/security-audit
      p/secrets
      p/dockerfile
      p/docker-compose
      p/eslint-plugin-security
      p/nodejsscan
      p/flask
      p/xss
      p/jwt
      p/command-injection
      p/r2c-ci
      p/r2c-security-audit
      p/owasp-top-ten
      p/gitlab-bandit
      p/gitlab-eslint

################################
########## Generation ##########
################################
generation:backend_entity:
  stage: generation
  image: openapitools/openapi-generator-cli:v7.12.0
  script:
    - java -jar $OPENAPI_CLI generate -i openapi/spec.yaml -g python-flask -o tmpsrc --additional-properties packageName=adh6 --additional-properties=modelPackage=entity --additional-properties=usePydanticModels=true --additional-properties=pydanticModelsStrongTyping=true
    - cp -r tmpsrc/adh6/entity/* api_server/adh6/entity/
    - cp tmpsrc/adh6/typing_utils.py api_server/adh6/
    - cp tmpsrc/adh6/util.py api_server/adh6/
    - sed -i'' -e 's/result\[attr\]/result\[self.attribute_map\[attr\]\]/g' api_server/adh6/entity/base_model.py
  artifacts:
    paths:
      - api_server/adh6/entity/
      - api_server/adh6/typing_utils.py
      - api_server/adh6/util.py
    expire_in: 1 day

generation:frontend_module:
  stage: generation
  image: openapitools/openapi-generator-cli:v7.12.0
  script:
    - rm -rf "frontend_angular/src/app/api"
    - java -jar $OPENAPI_CLI generate -i openapi/spec.yaml -g typescript-angular -o "frontend_angular/src/app/api" --additional-properties=queryParamObjectFormat=key
    - find frontend_angular/src/app/api/api -type f -name "*.service.ts" -exec sed -i 's/private addToHttpParams(/private addToHttpParamsBad(/g' {} \;
    - find frontend_angular/src/app/api/api -type f -name "*.service.ts" -exec sed -i 's/addToHttpParamsRecursive/addToHttpParams/g' {} \;
  artifacts:
    paths:
      - frontend_angular/src/app/api
    expire_in: 1 day

generation:frontend_assets:
  stage: generation
  image: node:22-alpine
  cache:
    key: yarn-assets
    paths:
      - .yarn-cache
      - /var/cache/apk
  before_script:
    - apk update
    - apk add python3 make g++ openssl
    - yarn config set cache-folder .yarn-cache
  script:
    - yarn global add svgo
    - cd frontend_angular/src/assets
    - svgo minet.svg adh6-logo.svg minet-dark.svg -o minet.min.svg adh6.min.svg minet-dark.min.svg
  artifacts:
    paths:
      - frontend_angular/src/assets
    expire_in: 1 day

##################################################
########## Linting frontend and backend ##########
##################################################
lint:frontend:
  stage: lint
  needs:
    - generation:frontend_module
    - generation:frontend_assets
  <<: *before_angular_jobs
  script:
    - yarn lint

lint:backend:
  stage: lint
  needs:
    - generation:backend_entity
  <<: *before_python_jobs
  script:
    - uv run ruff format --check
    - uv run ruff check

# https://gitlab.com/liant-sasu/pyright2gitlab-ci/-/tree/main
type_check:backend:
  stage: lint
  image: registry.gitlab.com/liant-sasu/pyright2gitlab-ci:node-current-alpine-latest
  needs:
    - generation:backend_entity
  cache:
    key: python-venv
    paths:
      - api_server/.venv/
  before_script:
    - cd api_server/
    - apk update
    - apk add git mariadb-dev build-base libffi-dev sqlite
    - python3 -m venv .venv
    - source .venv/bin/activate
    - pip install uv
    - uv sync --frozen
  script:
    - source .venv/bin/activate
    - pyright --outputjson . > report_raw.json
  after_script:
    - cd api_server/
    - source .venv/bin/activate || true
    - pyright-to-gitlab-ci --src report_raw.json --output codequality-pyright.json --base_path .
  artifacts:
    reports:
      codequality: api_server/codequality-pyright.json
    expire_in: 1 week
    when: always
  allow_failure: true

####################################
########## Backends Tests ##########
####################################
test:backend:
  stage: test
  needs:
    - generation:backend_entity
  <<: *before_python_jobs # We reference our previous anchor
  script:
    - uv run pytest -vvv --cov-fail-under=70 --cov-report=term --junitxml=report.xml
  artifacts:
    paths:
      - api_server/htmlcov/
    reports:
      junit: api_server/report.xml

