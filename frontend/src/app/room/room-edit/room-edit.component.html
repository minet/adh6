<h2 class="title is-2">Modification d'une chambre</h2>
@if (room$ | async) {
  <form [formGroup]="roomEdit" (ngSubmit)="onSubmit()" novalidate>
    <div class="field">
      <label class="label">Numéro de chambre</label>
      <input
        class="input is-fullwidth"
        formControlName="roomNumber"
        [attr.disabled]="true"
        type="number" />
      <p class="help">Identifiant physique de la chambre (non modifiable)</p>
    </div>
    <div class="field">
      <label class="label">Numéro de VLAN</label>
      <input
        class="input is-fullwidth"
        formControlName="vlan"
        type="number"
        placeholder="ex : 42" />
      <p class="help">Numéro du VLAN (41–49) — les IP des appareils filaires seront réassignées</p>
    </div>
    <div class="field">
      <label class="label">Description</label>
      <input
        class="input is-fullwidth"
        formControlName="description"
        type="text" />
    </div>
    <button
      type="submit"
      [disabled]="disabled || roomEdit.invalid"
      class="button is-primary is-fullwidth">
      <span class="icon"><i class="fas fa-save"></i></span>
      <span>Enregistrer</span>
    </button>
  </form>
}
