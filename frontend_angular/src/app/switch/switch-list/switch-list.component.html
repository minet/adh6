<div class="columns">
  <div class="column">
    <input
      #searchBox
      id="search-box"
      (keyup)="search(searchBox.value)"
      class="input is-fullwidth"
      placeholder="Rechercher..."
      type="text" />
  </div>
  <div class="column is-narrow">
    <a [routerLink]="['../add']">
      <button class="button is-primary">Nouveau commutateur</button>
    </a>
  </div>
</div>
<table class="table is-hoverable is-striped is-fullwidth is-clickable">
  <thead>
    <tr>
      <th style="width: 50%">Description</th>
      <th style="width: 50%">Adresse IP</th>
    </tr>
  </thead>
  @if (result$ | async; as result) {
    <tbody>
      @for (switchResult of result; track switchResult) {
        <tr [routerLink]="['/switch', switchResult.id, 'view']">
          <td>
            {{ switchResult.description }}
          </td>
          <td>{{ switchResult.ip }}</td>
        </tr>
      }
    </tbody>
  } @else {
    <tr>
      <td colspan="42">
        <div class="notification is-info is-light has-text-centered">
          <h4 class="title is-4">Chargement ...</h4>
        </div>
      </td>
    </tr>
  }
</table>
<app-pagination
  [maxItems]="maxItems"
  (pageChange)="handlePageChange($event)"></app-pagination>
